name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nscell_expansion_probe.m -o nscell_expansion_probe
          ./nscell_expansion_probe 2>./nsresponder_held_probe 2>&11
