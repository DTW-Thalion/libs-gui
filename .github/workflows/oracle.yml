name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nscell_defaults_probe.m -o nscell_defaults_probe
          ./nscell_defaults_probe 2>&1
