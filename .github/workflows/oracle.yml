name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nsresponder_held_probe.m -o nsresponder_held_probe
          ./nsresponder_held_probe 2>&1
