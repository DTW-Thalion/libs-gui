name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nstableview_indicator_probe.m -o nstableview_indicator_probe
          ./nstableview_indicator_probe 2>&1
