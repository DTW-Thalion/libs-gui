name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nstextview_charshape_probe.m -o nstextview_charshape_probe
          ./nstextview_charshape_probe 2>&1
