name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run the AppKit probe
        run: |
          clang -Wno-deprecated-declarations -framework Cocoa \
            Tests/oracle/nswindow_resizeindicator_probe.m -o nswindow_resizeindicator_probe
          ./nswindow_resizeindicator_probe 2>&1
