name: AppKit oracle
on: push
jobs:
  probe:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse the AppKit SDK headers for the public method surface
        run: |
          SDK=$(xcrun --sdk macosx --show-sdk-path)
          echo "SDK=$SDK"
          python3 Tests/oracle/parse_headers.py \
            "$SDK/System/Library/Frameworks/AppKit.framework/Headers" \
            "$SDK/System/Library/Frameworks/AppKit.framework/Versions/C/Headers" 2>&1
